services:
  varroda-api:
    image: python:3.11-slim
    container_name: varroda-api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install flask flask-cors pymysql -q && python3 api.py"

  varroda-web:
    image: nginx:alpine
    container_name: varroda-web
    restart: unless-stopped
    depends_on:
      - varroda-api
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8082:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.varroda.rule=Host(`varroda.vanceiam.com`)"
      - "traefik.http.routers.varroda.entrypoints=websecure"
      - "traefik.http.routers.varroda.tls.certresolver=letsencrypt"
      - "traefik.http.services.varroda.loadbalancer.server.port=80"
